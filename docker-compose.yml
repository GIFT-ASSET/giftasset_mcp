version: '3.8'

services:
  telegram-gifts-mcp:
    build: .
    container_name: telegram-gifts-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8000}
      GIFTASSET_API_URL: ${GIFTASSET_API_URL:-https://api.giftasset.dev/}
      GIFTASSET_API_KEY: ${GIFTASSET_API_KEY:-}
    expose:
      - "8000"
    # For stdio transport, set MCP_TRANSPORT=stdio and uncomment:
    # stdin_open: true
    # tty: true
